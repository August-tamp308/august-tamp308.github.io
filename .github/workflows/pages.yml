name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          A74E3E: ${{ secrets.A74E3E }}
          B8348D: ${{ secrets.B8348D }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A74E3E', '')
          k2 = os.environ.get('B8348D', '')
          done = 0
          for idx in pathlib.Path('_site').rglob('*.html'):
              try:
                  txt = idx.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = txt.replace('<!-- 0971d3cf77132bcce0fa3037567b19849714dabfb224ee -->', k1) if k1 else txt
              out = out.replace('<!--  -->', k2) if k2 else out
              if out != txt:
                  idx.write_text(out, encoding='utf-8')
                  done += 1
          if done == 0 and (k1 or k2):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
